# SPDX-License-Identifier: MPL-2.0
name: Generate SBOM
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - name: Setup Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: '9.6.6'
          enable-stack: true
      - name: Generate Haskell dependency tree
        run: |
          stack build --dry-run
          stack ls dependencies --separator=, > haskell-deps.csv
      - name: Generate SBOM with CycloneDX
        run: |
          cat > sbom-base.json << 'EOF'
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "version": 1,
            "metadata": {
              "component": {
                "type": "application",
                "name": "casket-ssg",
                "version": "1.0.0",
                "description": "Pure functional static site generator with Gnosis metadata integration"
              }
            },
            "components": []
          }
          EOF

          cp sbom-base.json cyclonedx-sbom.json
      - name: Upload SBOM
        # SHA fix 2026-05-25: previous pin did not exist upstream.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: cyclonedx-sbom.json
          retention-days: 90
      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2
        with:
          files: |
            cyclonedx-sbom.json
            haskell-deps.csv
