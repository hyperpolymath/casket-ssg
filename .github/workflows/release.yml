# SPDX-License-Identifier: MPL-2.0
name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
permissions: read-all
jobs:
  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
          - os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
          - os: darwin
            arch: x86_64
            runner: macos-15-intel
          - os: darwin
            arch: aarch64
            runner: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Haskell
        # SHA fix 2026-05-25: previous pin (dd344bc...74e) did not exist
        # upstream (`gh api repos/haskell-actions/setup/commits/<sha>` 422s).
        # Use v2.11.0, matching the other CI workflows in this repo.
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: '9.8'
          cabal-version: '3.12'
      - name: Cache Cabal
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-${{ matrix.arch }}-cabal-${{ hashFiles('*.cabal', 'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cabal-
      - name: Build
        run: |
          cabal update
          cabal build --enable-executable-static || cabal build
      - name: Package
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove leading 'v' if present

          mkdir -p dist/casket-ssg-${VERSION}

          # Find and copy the binary
          BINARY=$(find dist-newstyle -name 'casket-ssg' -type f -executable 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            # Fallback: look for Main or the module name
            BINARY=$(find dist-newstyle -name 'Casket' -type f -executable 2>/dev/null | head -1)
          fi

          if [ -n "$BINARY" ]; then
            cp "$BINARY" dist/casket-ssg-${VERSION}/casket-ssg
            chmod +x dist/casket-ssg-${VERSION}/casket-ssg
          else
            echo "::error::Could not find built binary"
            find dist-newstyle -type f -executable
            exit 1
          fi

          # Copy documentation
          cp README.adoc dist/casket-ssg-${VERSION}/ || cp README.md dist/casket-ssg-${VERSION}/ || true
          cp LICENSE dist/casket-ssg-${VERSION}/ || true

          # Create tarball
          cd dist
          ARCHIVE="casket-ssg-${{ matrix.arch }}-${{ matrix.os }}-${VERSION}.tar.gz"
          tar -czvf "${ARCHIVE}" casket-ssg-${VERSION}

          # Create checksum
          if command -v sha256sum &>/dev/null; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: casket-ssg-${{ matrix.arch }}-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: |
          find artifacts -type f
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.sha256
